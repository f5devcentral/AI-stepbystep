#
# DNS provider credentials Secret for cert-manager DNS-01 solver.
#
# This Secret must live in the cert-manager namespace so that the ClusterIssuer
# can read it via secretAccessKeySecretRef.
#
# Fill in the credential value below before applying. Never commit filled values.
# The provider-specific field names in 04-certmanager.yaml reference this Secret.
#
# --- AWS Route53 example ---
# Required IAM permissions:
#   route53:GetChange
#   route53:ChangeResourceRecordSets
#   route53:ListHostedZonesByName
#
# --- Cloudflare example ---
# Use an API Token (not the Global API Key) scoped to Zone / DNS / Edit.
# Change the key name below to "api-token" and reference it in 04-certmanager.yaml.
#
# --- Other providers ---
# See https://cert-manager.io/docs/configuration/acme/dns01/ for all supported
# providers and their required credential fields.
---
apiVersion: v1
kind: Secret
metadata:
  name: dns-provider-credentials
  namespace: cert-manager
  labels:
    app.kubernetes.io/part-of: openclaw-network-boundary
type: Opaque
stringData:
  # Replace with your DNS provider's credential value.
  # For AWS Route53: this is the IAM secret access key.
  # For Cloudflare: this is the API token. Rename the key to "api-token".
  secret-access-key: REPLACE_DNS_PROVIDER_SECRET
