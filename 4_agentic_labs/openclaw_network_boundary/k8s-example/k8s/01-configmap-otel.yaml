apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-config
  namespace: openclaw
  labels:
    app.kubernetes.io/name: otel-collector
    app.kubernetes.io/part-of: openclaw-network-boundary
data:
  collector.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317

    processors:
      batch:
        timeout: 5s
        send_batch_size: 512

    exporters:
      file:
        path: /data/network-boundary-traffic.jsonl
        append: true

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [batch]
          exporters: [file]
