#
# Secret template — replace ALL placeholder values before applying.
# Do NOT commit a filled-in version of this file.
#
# Apply with:
#   kubectl apply -f k8s/02-secret.yaml
#
# Or generate from a .env file:
#   kubectl create secret generic openclaw-env \
#     --namespace=openclaw \
#     --from-env-file=.env \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: openclaw-env
  namespace: openclaw
  labels:
    app.kubernetes.io/part-of: openclaw-network-boundary
type: Opaque
stringData:
  # Token required to authenticate with the OpenClaw UI and API.
  GATEWAY_TOKEN: "replace-with-a-secure-random-token"

  # Ollama model to serve. Must match what the ollama StatefulSet pulls on startup.
  OLLAMA_MODEL: "qwen2.5:3b"
  OLLAMA_CHAT_MODEL: "qwen2.5:3b"

  # Publicly accessible domain name pointing at this cluster's external IP.
  # Must match the Certificate dnsNames in 04-certmanager.yaml.
  ACME_DOMAIN: "replace-with-your-domain.example.com"

  # Email for Let's Encrypt ACME account registration (cert-manager ClusterIssuer).
  ACME_EMAIL: "replace-with-your-email@example.com"

  # External hostname or IP used in OpenClaw CORS allowed origins.
  # Set to the same value as ACME_DOMAIN or the node IP for local access.
  OPENCLAW_HOST: "replace-with-your-domain.example.com"
  OPENCLAW_HOST_PORT: "19000"

  # nginx backend routing — must match the openclaw Service name and port.
  BACKEND_HOST: "openclaw"
  BACKEND_PORT: "19000"
