# OpenClaw Network Boundary — Docker Compose
# Full self-contained stack: OpenClaw gateway + Ollama LLM + TLS termination +
# outbound traffic control via nginx forward proxy + OpenTelemetry observability.
#
# Required variables (set in .env — see .env.example):
#   GATEWAY_TOKEN, OPENCLAW_HOST, OPENCLAW_HOST_PORT,
#   OLLAMA_MODEL, OLLAMA_CHAT_MODEL,
#   ACME_DOMAIN, ACME_EMAIL
#
# TLS certificates are issued and renewed by ngx_http_acme_module (HTTP-01).
# Port 80 must be publicly reachable from the internet for ACME challenges.
#
# Jetson (arm64):  set OLLAMA_RUNTIME=nvidia in .env, then: docker compose up
# x86:             set OLLAMA_RUNTIME= (empty) in .env, then: docker compose up

services:

  # ── OpenClaw gateway ────────────────────────────────────────────────────────
  openclaw:
    build:
      context: ./services/openclaw
      dockerfile: Dockerfile
    container_name: openclaw
    restart: unless-stopped
    environment:
      GATEWAY_TOKEN: ${GATEWAY_TOKEN}
      OPENCLAW_USER: ${OPENCLAW_USER:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5:3b}
      # Route all outbound traffic through the nginx forward proxy
      HTTP_PROXY: http://nginx:8080
      HTTPS_PROXY: http://nginx:8080
      NO_PROXY: ollama,otel-collector,localhost,127.0.0.1
      # Host IP/hostname used in CORS origins
      OPENCLAW_HOST: ${OPENCLAW_HOST}
      OPENCLAW_HOST_PORT: ${OPENCLAW_HOST_PORT:-19000}
      ACME_DOMAIN: ${ACME_DOMAIN}
    cap_add:
      - NET_ADMIN
    volumes:
      - openclaw-state:/root/.openclaw
    networks:
      - net-internal
      - net-proxy
      - net-ingress
    depends_on:
      - ollama
    expose:
      - "19000"

  # ── Ollama LLM backend ──────────────────────────────────────────────────────
  # Default: official Ollama binary built for Jetson (JetPack 6, nvidia runtime)
  # x86 override: compose.override.x86.yml swaps to ollama/ollama:latest
  ollama:
    build:
      context: ./services/ollama
      dockerfile: Dockerfile
    container_name: ollama
    restart: unless-stopped
    runtime: ${OLLAMA_RUNTIME:-}
    environment:
      OLLAMA_HOST: "0.0.0.0:11434"
      OLLAMA_FLASH_ATTENTION: "1"
      OLLAMA_KV_CACHE_TYPE: q8_0
      OLLAMA_CONTEXT_LENGTH: "32768"
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:3b}
    volumes:
      - ollama-models:/data/models/ollama/models
      - ./services/ollama/entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/bash", "/entrypoint.sh"]
    networks:
      - net-internal
      - net-pull

  # ── nginx: inbound reverse proxy + outbound forward proxy + ACME ───────────
  # Inbound (port 19000 HTTPS + port 80 HTTP-01 ACME): terminates TLS for clients
  # Outbound (port 8080): CONNECT tunnel for HTTPS, plain proxy for HTTP.
  #   openclaw routes through HTTP_PROXY/HTTPS_PROXY — nginx controls access,
  #   does NOT decrypt HTTPS content (no MITM).
  nginx:
    build:
      context: ./services/nginx
      dockerfile: Dockerfile
    container_name: nginx
    restart: unless-stopped
    environment:
      ACME_DOMAIN: ${ACME_DOMAIN}
      ACME_EMAIL: ${ACME_EMAIL}
      BACKEND_HOST: openclaw
      BACKEND_PORT: "19000"
    ports:
      - "${OPENCLAW_HOST_PORT:-19000}:19000"
      - "80:80"
    volumes:
      - ./services/nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - nginx-acme-state:/var/cache/nginx/acme-letsencrypt
    networks:
      - net-ingress
      - net-proxy
      - net-telemetry
      - net-pull
    depends_on:
      - otel-collector

  # ── OpenTelemetry Collector ─────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    restart: unless-stopped
    user: "0"
    command: ["--config=/etc/otel/collector.yaml"]
    volumes:
      - ./services/otel/collector.yaml:/etc/otel/collector.yaml:ro
      - otel-data:/data
    networks:
      - net-telemetry
    expose:
      - "4317"

# ── Named volumes ───────────────────────────────────────────────────────────
volumes:
  otel-data:
  nginx-acme-state:
  openclaw-state:
  ollama-models:

# ── Networks ────────────────────────────────────────────────────────────────
networks:
  # LLM inference path — openclaw ↔ ollama only; no external routing
  net-internal:
    internal: true

  # Inbound path — nginx ↔ openclaw
  net-ingress:

  # Outbound proxy path — openclaw → nginx forward proxy → internet
  net-proxy:

  # Telemetry path — nginx, otel-collector; internal only
  net-telemetry:
    internal: true

  # Internet access for ollama model pulls and nginx ACME challenges
  net-pull: {}
